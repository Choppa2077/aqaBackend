name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./internal/service/... -v -cover -timeout 60s

      - name: Run integration tests
        run: go test ./internal/delivery/... -v -timeout 60s

      - name: Generate coverage report
        run: go test ./internal/service/... ./internal/delivery/rest/v1/... -coverprofile=coverage.out -timeout 60s

      - name: Check coverage threshold (15%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk "BEGIN { if ($COVERAGE+0 < 15) { print \"Coverage \" $COVERAGE \"% is below 15% threshold\"; exit 1 } }" <<< "$COVERAGE"

      - name: Upload test results
        if: always()
        run: go test ./internal/... -json -timeout 60s > test-results.json || true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.out
